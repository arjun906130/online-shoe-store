<html>
<head>
    <link rel="stylesheet" href="sign.css">
</head>
<body>
    <div id="div1">
        <h1>Sign Up</h1>
        <form name="fm" onsubmit="return reg()">
            <label for="email">EMAIL</label>
            <input id="email" name="email" type="text" placeholder="Enter your Email">

            <label for="pass">PASSWORD</label>
            <input id="pass" name="password" type="password" placeholder="Enter your password">

            <button type="submit">SUBMIT</button><br>
            <a href="login34.html" id="nxt">LOGIN</a>
        </form>
    </div>

    <script>
        function reg() {
            let email = document.fm.email.value;
            let password = document.fm.password.value;

            if (email === "") {
                alert("Email is empty");
                return false;
            }
            if (!email.includes("@")) 
            {
                alert("Email must contain '@'");
                return false;
            }

            if (password === "") {
                alert("Password is empty");
                return false;
            }
             
            if (!password.includes("6")) 
            {
                alert("Password must contain the number 6");
                return false;
            }

            
            return true; 
        }
    </script>
</body>
</html>

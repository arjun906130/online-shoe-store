<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your Shopping Cart - Review your selected Nike items and proceed to checkout.">
    <title>Your Cart — NIKE Store</title>
    <link rel="stylesheet" href="css/we.css">
    <link rel="stylesheet" href="css/addcart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header id="main-header">
        <nav>
            <ul class="nav-list" id="nav-links">
                <li><img src="image/Nike___Designer__Carolyn_Davidson__Firm__n_a_-removebg-preview.png" alt="Nike Logo" id="logo" /></li>
                <li><h1>NIKE</h1></li>
                <li><a href="web2.html">Home</a></li>
                <li><a href="home.html">New & Featured</a></li>
                <li><a href="men.html">Men</a></li>
                <li><a href="women.html">Women</a></li>
                <li><a href="sock.html">Socks</a></li>
                <li id="cart-item"><a href="addcart.html" id="signup">🛒<span id="cart-count">0</span></a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobile-toggle" aria-label="Toggle Menu">
                <i class="fas fa-bars"></i>
            </button>
        </nav>
    </header>

    <div class="cart">
        <h2>YOUR SHOPPING CART</h2>

        <table id="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- JavaScript will insert rows here -->
            </tbody>
        </table>

        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <p id="p1">Estimated Total: <span id="cart-total">0</span></p>
            <div style="display: flex; gap: 12px;">
                <button id="clear-cart" class="clear-btn">Clear Cart</button>
                <button class="clear-btn" style="background: var(--accent-gradient, #f5c518); color: #000; border: none; padding: 14px 40px;" onclick="alert('Checkout functionality coming soon!')">Checkout</button>
            </div>
        </div>
    </div>

    <script src="js/act.js"></script>
    <script src="js/prod.js"></script>
    <script src="js/newproduct.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            updateCartCount();
            const header = document.getElementById('main-header');
            window.addEventListener('scroll', () => {
                header.classList.toggle('scrolled', window.scrollY > 50);
            });
            const toggle = document.getElementById('mobile-toggle');
            const navLinks = document.getElementById('nav-links');
            if (toggle) {
                toggle.addEventListener('click', () => {
                    navLinks.classList.toggle('open');
                    const icon = toggle.querySelector('i');
                    icon.classList.toggle('fa-bars');
                    icon.classList.toggle('fa-xmark');
                });
            }
        });
    </script>
</body>
</html>
